# SPDX-License-Identifier: Apache-2.0

# name of the action
name: release

# trigger on push events with `v*` in tag
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# pipeline to execute
jobs:
  release:
    name: release tagged image
    runs-on: ubuntu-latest

    permissions:
      actions: write # for actions/cache to write to the cache location

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-v3-${{ hashFiles('**/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-v3-
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".nvmrc"

      # в”Ңв”җ в”¬ в”¬в”¬в”¬  в”Ңв”¬в”җ
      # в”ңв”ҙв”җв”Ӯ в”Ӯв”Ӯв”Ӯ   в”Ӯв”Ӯ
      # в””в”Җв”ҳв””в”Җв”ҳв”ҙв”ҙв”Җв”ҳв”Җв”ҙв”ҳ
      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: run production build
        run: npm run build:prod

      # в”Ңв”¬в”җв”Ңв”Җв”җв”Ңв”Җв”җв”¬в”Ңв”Җв”Ңв”Җв”җв”¬в”Җв”җ
      #  в”Ӯв”Ӯв”Ӯ в”Ӯв”Ӯ  в”ңв”ҙв”җв”ңв”Ө в”ңв”¬в”ҳ
      # в”Җв”ҙв”ҳв””в”Җв”ҳв””в”Җв”ҳв”ҙ в”ҙв””в”Җв”ҳв”ҙв””в”Җ
      - name: login to dockerhub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: target/vela-ui
          tags: |
            # only on push tag, "raw" because {{version}} strips "v" prefix
            type=semver,pattern={{raw}}

      - name: build and push image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
