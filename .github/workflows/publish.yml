# SPDX-License-Identifier: Apache-2.0

# name of the action
name: release

# trigger on push events with `v*` in tag
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# pipeline to execute
jobs:
  release:
    name: release tagged image
    runs-on: ubuntu-latest

    permissions:
      actions: write # for actions/cache to write to the cache location

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-v3-${{ hashFiles('**/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-v3-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"

      # в”Ңв”җ в”¬ в”¬в”¬в”¬  в”Ңв”¬в”җ
      # в”ңв”ҙв”җв”Ӯ в”Ӯв”Ӯв”Ӯ   в”Ӯв”Ӯ
      # в””в”Җв”ҳв””в”Җв”ҳв”ҙв”ҙв”Җв”ҳв”Җв”ҙв”ҳ
      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: run production build
        run: npm run build:prod

      # в”Ңв”¬в”җв”Ңв”Җв”җв”Ңв”Җв”җв”¬в”Ңв”Җв”Ңв”Җв”җв”¬в”Җв”җ
      #  в”Ӯв”Ӯв”Ӯ в”Ӯв”Ӯ  в”ңв”ҙв”җв”ңв”Ө в”ңв”¬в”ҳ
      # в”Җв”ҙв”ҳв””в”Җв”ҳв””в”Җв”ҳв”ҙ в”ҙв””в”Җв”ҳв”ҙв””в”Җ
      - name: login to dockerhub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: target/vela-ui
          tags: |
            # only on push tag, "raw" because {{version}} strips "v" prefix
            type=semver,pattern={{raw}}

      - name: build and push image
        id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
