# SPDX-License-Identifier: Apache-2.0

# name of the action
name: release

# trigger on push events with `v*` in tag
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# pipeline to execute
jobs:
  release:
    name: release tagged image
    runs-on: ubuntu-latest

    permissions:
      actions: write # for actions/cache to write to the cache location

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-v3-${{ hashFiles('**/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-v3-
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      # в”Ңв”җ в”¬ в”¬в”¬в”¬  в”Ңв”¬в”җ
      # в”ңв”ҙв”җв”Ӯ в”Ӯв”Ӯв”Ӯ   в”Ӯв”Ӯ
      # в””в”Җв”ҳв””в”Җв”ҳв”ҙв”ҙв”Җв”ҳв”Җв”ҙв”ҳ
      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: run production build
        run: npm run build:prod

      # в”Ңв”¬в”җв”Ңв”Җв”җв”Ңв”Җв”җв”¬в”Ңв”Җв”Ңв”Җв”җв”¬в”Җв”җ
      #  в”Ӯв”Ӯв”Ӯ в”Ӯв”Ӯ  в”ңв”ҙв”җв”ңв”Ө в”ңв”¬в”ҳ
      # в”Җв”ҙв”ҳв””в”Җв”ҳв””в”Җв”ҳв”ҙ в”ҙв””в”Җв”ҳв”ҙв””в”Җ
      - name: login to dockerhub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: target/vela-ui
          tags: |
            # only on push tag, "raw" because {{version}} strips "v" prefix
            type=semver,pattern={{raw}}

      - name: build and push image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
