# SPDX-License-Identifier: Apache-2.0

# name of the action
name: ci

# trigger on pull_request or push events
on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CI: 1

# pipeline to execute
jobs:
  # в”Ңв”Җв”җв”¬  в”Ңв”¬в”җ   в”Ңв”Җв”җв”Ңв”Җв”җв”¬в”Җв”җв”Ңв”¬в”җв”Ңв”Җв”җв”Ңв”¬в”җ
  # в”ңв”Ө в”Ӯ  в”Ӯв”Ӯв”Ӯв”Җв”Җв”Җв”ңв”Ө в”Ӯ в”Ӯв”ңв”¬в”ҳв”Ӯв”Ӯв”Ӯв”ңв”Җв”Ө в”Ӯ
  # в””в”Җв”ҳв”ҙв”Җв”ҳв”ҙ в”ҙ   в””  в””в”Җв”ҳв”ҙв””в”Җв”ҙ в”ҙв”ҙ в”ҙ в”ҙ
  elm-format:
    name: validate elm files
    runs-on: ubuntu-latest

    permissions:
      actions: write # for actions/cache to write to cache location

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-bin-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-bin-v2-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"

      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: install elm-format
        run: npm i elm-format@0.8.5
      - name: run elm-format
        run: npm run lint:elm

  # в”Ңв”Җв”җв”¬  в”Ңв”¬в”җ  в”Ңв”¬в”җв”Ңв”Җв”җв”Ңв”Җв”җв”Ңв”¬в”җ
  # в”ңв”Ө в”Ӯ  в”Ӯв”Ӯв”Ӯв”Җв”Җв”Җв”Ӯ в”ңв”Ө в””в”Җв”җ в”Ӯ
  # в””в”Җв”ҳв”ҙв”Җв”ҳв”ҙ в”ҙ   в”ҙ в””в”Җв”ҳв””в”Җв”ҳ в”ҙ
  elm-test:
    name: run elm tests
    runs-on: ubuntu-latest

    permissions:
      actions: write # for actions/cache to write to cache location

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-v3-${{ hashFiles('**/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-v3-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-bin-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-bin-v2-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"

      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: install elm-test
        run: npm i elm-test@0.19.1-revision6
      - name: run elm-test
        run: npm run test

  # в”¬  в”¬в”Ңв”җв”Ңв”Ңв”¬в”җ
  # в”Ӯ  в”Ӯв”Ӯв”Ӯв”Ӯ в”Ӯ
  # в”ҙв”Җв”ҳв”ҙв”ҳв””в”ҳ в”ҙ
  lint:
    name: lint
    runs-on: ubuntu-latest

    permissions:
      actions: write # for actions/cache to write to cache location

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-bin-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-bin-v2-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"

      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: run linter
        run: npm run lint

  # в”Ңв”Җв”җв”¬ в”¬в”Ңв”Җв”җв”¬в”Җв”җв”Ңв”Җв”җв”Ңв”Җв”җв”Ңв”Җв”җ
  # в”Ӯ  в””в”¬в”ҳв”ңв”Җв”ҳв”ңв”¬в”ҳв”ңв”Ө в””в”Җв”җв””в”Җв”җ
  # в””в”Җв”ҳ в”ҙ в”ҙ  в”ҙв””в”Җв””в”Җв”ҳв””в”Җв”ҳв””в”Җв”ҳ
  integration:
    name: run cypress tests
    runs-on: ubuntu-latest
    env:
      VELA_API: "http://localhost:8080"
      TERM: xterm

    permissions:
      actions: write # for actions/cache to write to cache location

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-v3-${{ hashFiles('**/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-v3-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-bin-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            cypress-${{ runner.os }}-bin-v2-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"

      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: run cypress tests
        run: npm run test:cy

  # в”Ңв”Җв”җв”¬ в”¬в”Ңв”җ в”¬  в”¬в”Ңв”Җв”җв”¬ в”¬
  # в”ңв”Җв”ҳв”Ӯ в”Ӯв”ңв”ҙв”җв”Ӯ  в”Ӯв””в”Җв”җв”ңв”Җв”Ө
  # в”ҙ  в””в”Җв”ҳв””в”Җв”ҳв”ҙв”Җв”ҳв”ҙв””в”Җв”ҳв”ҙ в”ҙ
  publish:
    name: build and push to docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'go-vela/ui'
    needs: [lint, elm-format, elm-test, integration]

    permissions:
      actions: write # for actions/cache to write to cache location

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.elm
          key: ${{ runner.os }}-elm-v3-${{ hashFiles('**/elm.json') }}
          restore-keys: |
            ${{ runner.os }}-elm-v3-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-v2-
      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-v2-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-v2-
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: ".nvmrc"

      # в”Ңв”җ в”¬ в”¬в”¬в”¬  в”Ңв”¬в”җ
      # в”ңв”ҙв”җв”Ӯ в”Ӯв”Ӯв”Ӯ   в”Ӯв”Ӯ
      # в””в”Җв”ҳв””в”Җв”ҳв”ҙв”ҙв”Җв”ҳв”Җв”ҙв”ҳ
      - name: install dependencies
        run: npm ci --prefer-offline --no-audit
      - name: run development build
        run: npm run build

      # в”Ңв”¬в”җв”Ңв”Җв”җв”Ңв”Җв”җв”¬в”Ңв”Җв”Ңв”Җв”җв”¬в”Җв”җ
      #  в”Ӯв”Ӯв”Ӯ в”Ӯв”Ӯ  в”ңв”ҙв”җв”ңв”Ө в”ңв”¬в”ҳ
      # в”Җв”ҙв”ҳв””в”Җв”ҳв””в”Җв”ҳв”ҙ в”ҙв””в”Җв”ҳв”ҙв””в”Җ
      - name: login to dockerhub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: extract metadata
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: target/vela-ui
          tags: |
            # latest
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build and push image
        id: push
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
